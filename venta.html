<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="menu">
    <h2>SISTEMA DE VENTAS</h2>
    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="producto.html">Productos</a></li>
        <li><a href="venta.html" class="activo">Ventas</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Ventas</h1>

    <select id="producto"></select>
    <input type="number" id="cantidad" placeholder="Cantidad">
    
    <button onclick="vender()">Vender</button>
    <button onclick="facturar()">Facturar</button> <!-- 🔥 NUEVO -->

    <p id="mensaje"></p>

    <h2>Historial</h2>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Fecha</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="historial"></tbody>
    </table>
</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

function cargarProductos() {
    producto.innerHTML = "";
    productos.forEach((p, i) => {
        if (p.stock > 0) {
            producto.innerHTML += `<option value="${i}">${p.nombre} (${p.stock})</option>`;
        }
    });
}

function vender() {
    let i = producto.value;
    let cant = Number(cantidad.value);

    if (productos[i].stock >= cant) {
        productos[i].stock -= cant;

        ventas.push({
            nombre: productos[i].nombre,
            cantidad: cant,
            fecha: new Date().toLocaleString()
        });

        localStorage.setItem("productos", JSON.stringify(productos));
        localStorage.setItem("ventas", JSON.stringify(ventas));

        mensaje.innerText = "Venta realizada";

        cargarProductos();
        mostrarVentas();
    }
}

function mostrarVentas() {
    historial.innerHTML = "";
    ventas.forEach((v, i) => {
        historial.innerHTML += `
        <tr>
            <td>${v.nombre}</td>
            <td>${v.cantidad}</td>
            <td>${v.fecha}</td>
            <td><button onclick="eliminarVenta(${i})">🗑️</button></td>
        </tr>`;
    });
}

/* 🔥 ELIMINAR VENTA + DEVOLVER STOCK */
function eliminarVenta(i) {
    let venta = ventas[i];

    let producto = productos.find(p => p.nombre === venta.nombre);
    if (producto) {
        producto.stock += venta.cantidad;
    }

    ventas.splice(i, 1);

    localStorage.setItem("productos", JSON.stringify(productos));
    localStorage.setItem("ventas", JSON.stringify(ventas));

    mostrarVentas();
    cargarProductos();
}

/* 🔥 FACTURAR */
function facturar() {

    if (ventas.length === 0) {
        alert("No hay ventas para facturar");
        return;
    }

    let factura = "----- FACTURA -----\n\n";
    let totalGeneral = 0;

    ventas.forEach(v => {
        let producto = productos.find(p => p.nombre === v.nombre);
        let precio = producto ? Number(producto.precio) : 0;
        let total = precio * v.cantidad;

        factura += `Producto: ${v.nombre}\n`;
        factura += `Cantidad: ${v.cantidad}\n`;
        factura += `Precio: $${precio}\n`;
        factura += `Total: $${total}\n`;
        factura += `------------------\n`;

        totalGeneral += total;
    });

    factura += `\nTOTAL GENERAL: $${totalGeneral}`;

    alert(factura);
}

cargarProductos();
mostrarVentas();
</script>

</body>
</html>
