<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<style>
body { font-family: Arial; background: #f4f6f8; margin: 0; }

header {
    background: #34a853;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.container {
    padding: 20px;
}

select, input, button {
    padding: 10px;
    margin: 5px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}
</style>
</head>

<body>

<header>
    <h1>Ventas</h1>
    <nav>
        <a href="index.html">Productos</a>
        <a href="venta.html">Ventas</a>
    </nav>
</header>

<div class="container">

<h2>Realizar venta</h2>

<select id="producto"></select>
<input type="number" id="cantidad" placeholder="Cantidad">
<button onclick="vender()">Vender</button>

<p id="mensaje"></p>

<h2>Historial</h2>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Fecha</th>
</tr>
</thead>
<tbody id="historial"></tbody>
</table>

</div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

const producto = document.getElementById("producto");
const cantidad = document.getElementById("cantidad");
const mensaje = document.getElementById("mensaje");
const historial = document.getElementById("historial");

function cargarProductos() {
    producto.innerHTML = "";

    productos.forEach((p, i) => {
        producto.innerHTML += `<option value="${i}">
            ${p.nombre} (Stock: ${p.stock})
        </option>`;
    });
}

function vender() {
    let i = producto.value;
    let cant = Number(cantidad.value);

    if (cant <= 0 || isNaN(cant)) {
        mensaje.innerText = "Cantidad inválida";
        return;
    }

    if (!productos[i]) {
        mensaje.innerText = "Selecciona un producto";
        return;
    }

    if (productos[i].stock >= cant) {
        productos[i].stock -= cant;

        ventas.push({
            nombre: productos[i].nombre,
            cantidad: cant,
            fecha: new Date().toLocaleString()
        });

        localStorage.setItem("productos", JSON.stringify(productos));
        localStorage.setItem("ventas", JSON.stringify(ventas));

        mensaje.innerText = "✅ Venta realizada";

        cargarProductos();
        mostrarVentas();
    } else {
        mensaje.innerText = "❌ No hay suficiente stock";
    }
}

function mostrarVentas() {
    historial.innerHTML = "";

    ventas.forEach(v => {
        historial.innerHTML += `
        <tr>
            <td>${v.nombre}</td>
            <td>${v.cantidad}</td>
            <td>${v.fecha}</td>
        </tr>`;
    });
}

cargarProductos();
mostrarVentas();
</script>

</body>
</html>
